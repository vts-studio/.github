name: Laravel CI

on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version"
        type: string
        default: "8.3"
      working-directory:
        description: "Path to Laravel project"
        type: string
        default: "backend"
      test-runner:
        description: "Test runner command (e.g. 'vendor/bin/phpunit' or 'vendor/bin/pest')"
        type: string
        default: "vendor/bin/pest"
      run-pint:
        description: "Run Laravel Pint check"
        type: boolean
        default: true
      run-tests:
        description: "Run test suite"
        type: boolean
        default: true
      run-phpstan:
        description: "Run PHPStan static analysis"
        type: boolean
        default: false
      phpstan-level:
        description: "PHPStan analysis level (0-9)"
        type: string
        default: "5"
      node-version:
        description: "Node version (for frontend assets if needed)"
        type: string
        default: "20"

jobs:
  pint:
    if: ${{ inputs.run-pint }}
    name: Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        working-directory: ${{ inputs.working-directory }}
        run: vendor/bin/pint --test

  tests:
    if: ${{ inputs.run-tests }}
    name: Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, pdo, pdo_mysql, redis
          coverage: none

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        working-directory: ${{ inputs.working-directory }}
        run: |
          cp .env.example .env || true
          php artisan key:generate || true

      - name: Run tests
        working-directory: ${{ inputs.working-directory }}
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: ${{ inputs.test-runner }}

  phpstan:
    if: ${{ inputs.run-phpstan }}
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        working-directory: ${{ inputs.working-directory }}
        run: vendor/bin/phpstan analyse --level=${{ inputs.phpstan-level }} --no-progress
